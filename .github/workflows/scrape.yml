name: Daily Palette Scrape

on:
  schedule:
    # Run at 7:00 AM UTC (8:00 AM Irish time)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python -m scraper.main --verbose

      - name: Commit and push results
        run: |
          git config user.name "Palette Bot"
          git config user.email "palette-bot@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          git diff --cached --quiet || {
            git commit -m "🎨 Daily scrape — $(date -u +%Y-%m-%d)"
            git push
          }
