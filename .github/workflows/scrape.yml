name: Daily Palette Scrape

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python -m scraper.main --verbose

      - name: Copy data to frontend
        run: |
          mkdir -p frontend/public/data
          cp data/products.json frontend/public/data/products.json

      - name: Commit and push
        run: |
          git config user.name "Palette Bot"
          git config user.email "palette-bot@users.noreply.github.com"
          git add data/ frontend/public/data/
          git diff --cached --quiet || {
            git commit -m "🎨 Daily scrape — $(date -u +%Y-%m-%d)"
            git push
          }